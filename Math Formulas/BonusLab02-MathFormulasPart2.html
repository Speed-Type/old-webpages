<!DOCTYPE html>

<html>

    <head>

        <title>Math Cheater 2000</title>
        <link href = "MathFormulasStyles.css" rel = "stylesheet" type = "text/css">

    </head>

    <body>

        <div id = "heading">Math Formula Calculator</div>

        <br>

        <select id="formulaSelect">

            <option value="default">Select formula</option>
            <option value="perimeterRect">Perimeter of a Rectangle</option>
            <option value="perimeterSquare">Perimeter of a Square</option>
            <option value="perimeterTriangle">Perimeter of a Triangle</option>
            <option value="circumferenceCircle">Circumference of a Circle</option>
            <option value="areaRect">Area of a Rectangle</option>
            <option value="areaSquare">Area of a Square</option>
            <option value="areaTriangle">Area of a Triangle</option>
            <option value="areaCircle">Area of a Circle</option>
            <option value="volRect">Volume of a Rectangle</option>
            <option value="volSquare">Volume of a Square</option>
            <option value="volCone">Volume of a Cone</option>
            <option value="volSphere">Volume of a Sphere</option>

        </select>

        <br><br>

        <div id = "length1Display">

            <label for = "length1">Length 1: </label>
            <input id = "length1" type = "text" value = "" placeholder = "Enter first length here">

        </div>

        <div id = "length2Display">

            <label for = "length2">Length 2: </label>
            <input id = "length2" type = "text" value = "" placeholder = "Enter second length here">

        </div>

        <div id = "length3Display">

            <label for = "length3">Length 3: </label>
            <input id = "length3" type = "text" value = "" placeholder = "Enter third length here">

        </div>

        <div id = "radiusDisplay">

            <label for = "radius">Radius: </label>
            <input id = "radius" type = "text" value = "" placeholder = "Enter radius here">

        </div>

        <div id = "baseDisplay">

            <label for = "base">Base: </label>
            <input id = "base" type = "text" value = "" placeholder = "Enter base here">

        </div>

        <div id = "heightDisplay">

            <label for = "height">Height: </label>
            <input id = "height" type = "text" value = "" placeholder = "Enter height here">

        </div>

        <br>

        <button id="button">Calculate</button>

        <br><br>

        <div id="output">Output: </div>

        <script src = "MathFormulaScript.js"></script>

    </body>

</html>
